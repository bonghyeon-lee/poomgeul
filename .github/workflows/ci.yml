name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 for JS-based actions ahead of the 2026-06-02 default
# switchover. Removes the "Node.js 20 deprecated" annotations from
# pnpm/action-setup, actions/cache, actions/upload-artifact.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # pnpm version is read from package.json#packageManager.
      # Specifying `with.version` here would conflict (ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Unit tests — api (Jest, no DB)
        run: pnpm --filter @poomgeul/api run test:unit

      - name: Unit tests — web (Vitest + RTL, jsdom)
        run: pnpm --filter @poomgeul/web run test

  migrate-and-smoke:
    name: db migrate · api smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: poomgeul
          POSTGRES_USER: poomgeul
          POSTGRES_PASSWORD: poomgeul
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U poomgeul"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      DATABASE_URL: postgres://poomgeul:poomgeul@localhost:5432/poomgeul
      TEST_DATABASE_URL: postgres://poomgeul:poomgeul@localhost:5432/poomgeul_test
      PORT: "3000"

    steps:
      - uses: actions/checkout@v6

      # pnpm version is read from package.json#packageManager.
      # Specifying `with.version` here would conflict (ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Drizzle migrations (app DB)
        run: pnpm --filter @poomgeul/db migrate

      - name: Create + migrate test DB (poomgeul_test)
        run: |
          PGPASSWORD=poomgeul psql -h localhost -U poomgeul -d postgres \
            -c "CREATE DATABASE poomgeul_test;"
          DATABASE_URL=$TEST_DATABASE_URL pnpm --filter @poomgeul/db migrate

      - name: Integration tests (withRollback · test DB)
        run: pnpm --filter @poomgeul/api run test:integration

      - name: E2E tests (NestApplication + supertest)
        run: pnpm --filter @poomgeul/api run test:e2e

      - name: Build API (compiled output needed for Swagger decorator metadata)
        run: pnpm --filter @poomgeul/api run build

      - name: Boot API in background (for smoke curls)
        run: |
          pnpm --filter @poomgeul/api start &
          echo "API_PID=$!" >> $GITHUB_ENV

      - name: Wait for /healthz
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/healthz > /dev/null; then
              echo "api is up"; exit 0
            fi
            sleep 1
          done
          echo "api did not become healthy in 30s" >&2
          exit 1

      - name: Smoke — /healthz returns status ok
        run: |
          body=$(curl -fsS http://localhost:3000/healthz)
          echo "$body"
          echo "$body" | grep -q '"status":"ok"'

      - name: Smoke — /api/docs-json serves OpenAPI
        run: |
          http_code=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:3000/api/docs-json)
          echo "http=$http_code"
          [ "$http_code" = "200" ]

      - name: Stop API
        if: always()
        run: |
          if [ -n "${API_PID:-}" ]; then
            kill "$API_PID" 2>/dev/null || true
          fi

  web-e2e:
    name: web e2e (Playwright · chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache Playwright browsers keyed on the version we install. Saves
      # ~100MB download on subsequent runs.
      - name: Resolve Playwright version
        id: playwright-version
        run: |
          v=$(pnpm --filter @poomgeul/web exec playwright --version | awk '{print $2}')
          echo "version=$v" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Chromium (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @poomgeul/web exec playwright install --with-deps chromium

      - name: Install Chromium system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @poomgeul/web exec playwright install-deps chromium

      - name: Run Playwright tests
        run: pnpm --filter @poomgeul/web run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 14

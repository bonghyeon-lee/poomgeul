services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: poomgeul-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-poomgeul}
      POSTGRES_USER: ${POSTGRES_USER:-poomgeul}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-poomgeul}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poomgeul}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
